<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letterina Animata</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #74c8e8 0%, #a8e0f5 50%, #d6f0fb 100%);
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Elementi decorativi fluttuanti */
  .floaty {
    position: absolute;
    top: 110%;
    font-size: 22px;
    opacity: 0.6;
    animation: salire linear infinite;
    pointer-events: none;
    user-select: none;
  }

  @keyframes salire {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.5; }
    100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
  }

  .scena {
    position: relative;
    width: 340px;
    height: 260px;
    z-index: 2;
  }

  /* ===== LETTERA (il foglio che esce) ===== */
  .lettera {
    position: absolute;
    left: 50%;
    bottom: 20px;
    width: 88%;
    min-height: 140px;
    background: #fffaf6;
    border-radius: 10px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    padding: 26px 20px 20px;
    transform: translate(-50%, 10px) scale(0.92);
    opacity: 0;
    transition: transform 0.7s cubic-bezier(.34,1.2,.4,1) 0.35s, opacity 0.6s ease 0.35s;
    z-index: 2;
    text-align: center;
  }

  .busta.aperta .lettera {
    transform: translate(-50%, -78px) scale(1);
    opacity: 1;
  }

  .lettera .emoji-grande {
    font-size: 2.2rem;
    margin-bottom: 10px;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.5s ease 0.7s, transform 0.5s cubic-bezier(.34,1.56,.64,1) 0.7s;
  }

  .busta.aperta .lettera .emoji-grande {
    opacity: 1;
    transform: scale(1);
  }

  .frase {
    font-size: 1.15rem;
    font-weight: 600;
    color: #2f6f8f;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.6s ease 0.85s, transform 0.6s ease 0.85s;
  }

  .busta.aperta .frase {
    opacity: 1;
    transform: translateY(0);
  }

  .firma {
    margin-top: 12px;
    font-size: 0.85rem;
    font-style: italic;
    color: #5fb3da;
    opacity: 0;
    transition: opacity 0.6s ease 1s;
  }

  .busta.aperta .firma {
    opacity: 1;
  }

  /* ===== BUSTA ===== */
  .busta {
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 180px;
    cursor: pointer;
    z-index: 3;
  }

  .busta:hover .corpo {
    transform: translateY(-3px);
  }

  /* Corpo della busta (rettangolo) */
  .corpo {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #bce6f7 0%, #7fcdf2 100%);
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(80,160,200,0.35);
    transition: transform 0.3s ease;
    overflow: hidden;
    z-index: 1;
  }

  /* Tasche triangolari laterali/inferiori della busta */
  .corpo::before,
  .corpo::after {
    content: '';
    position: absolute;
    bottom: 0;
    width: 0;
    height: 0;
    border-style: solid;
  }

  .corpo::before {
    left: 0;
    border-width: 0 0 110px 170px;
    border-color: transparent transparent rgba(255,255,255,0.18) transparent;
  }

  .corpo::after {
    right: 0;
    border-width: 0 170px 110px 0;
    border-color: transparent transparent rgba(255,255,255,0.18) transparent;
  }

  /* Linguetta superiore triangolare (il "coperchio") */
  .coperchio {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 0;
    border-style: solid;
    border-width: 110px 170px 0 170px;
    border-color: #8fd6f5 transparent transparent transparent;
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 0.8s cubic-bezier(.6,.05,.3,1);
    z-index: 4;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.08));
  }

  .busta.aperta .coperchio {
    transform: rotateX(180deg);
    z-index: 0;
  }

  /* Sigillo / cuore al centro */
  .sigillo {
    position: absolute;
    top: 58px;
    left: 50%;
    width: 46px;
    height: 46px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    transform: translate(-50%, 0) scale(1);
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    z-index: 5;
    transition: opacity 0.4s ease, transform 0.4s ease;
    animation: battito 1.6s ease-in-out infinite;
  }

  @keyframes battito {
    0%, 100% { transform: translate(-50%, 0) scale(1); }
    50% { transform: translate(-50%, 0) scale(1.1); }
  }

  .busta.aperta .sigillo {
    opacity: 0;
    transform: translate(-50%, -20px) scale(0.5);
    animation: none;
  }

  .istruzione {
    position: absolute;
    top: -28px;
    width: 100%;
    text-align: center;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.9);
    z-index: 3;
    transition: opacity 0.4s ease;
  }

  .busta.aperta .istruzione {
    opacity: 0;
  }
</style>
</head>
<body>

  <div class="scena">
    <div class="busta" id="busta" onclick="apri()">
      <div class="istruzione">tocca la busta per aprirla</div>

      <!-- Lettera che esce -->
      <div class="lettera">
       
        <p class="frase">sii meno stressata, sei così brava e forte che non te ne rendi neanche conto</p>
        <p class="firma">~Alfredo</p>
      </div>

      <!-- Corpo busta -->
      <div class="corpo"></div>

      <!-- Sigillo -->
      <div class="sigillo">💙</div>

      <!-- Coperchio (linguetta) -->
      <div class="coperchio"></div>
    </div>
  </div>

<script>
  function apri() {
    document.getElementById('busta').classList.toggle('aperta');
  }

  // Elementi decorativi fluttuanti
  const simboli = ['🧿','📘','✨','💙','⭐'];
  const body = document.body;

  for (let i = 0; i < 16; i++) {
    const el = document.createElement('span');
    el.className = 'floaty';
    el.textContent = simboli[Math.floor(Math.random() * simboli.length)];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.fontSize = (16 + Math.random() * 20) + 'px';
    el.style.animationDuration = (8 + Math.random() * 10) + 's';
    el.style.animationDelay = (Math.random() * 10) + 's';
    body.appendChild(el);
  }
</script>

</body>
</html>
